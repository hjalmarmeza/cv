                vfHost.style.height = '100dvh';
                vfHost.style.zIndex = '99999999';

                btn.style.transform = 'scale(1)';
                btn.style.pointerEvents = 'auto';

      pointer-events: auto !important;
      user-select: none;

    }
    #custom-ia-btn span {
      position: absolute;
      color: #ffffff;

  <div id="custom-ia-btn" class="no-print">
    <i class="fas fa-comment-dots"></i>
    <span>IA</span>
  </div>

  <script>
    (function() {
      var btn = document.getElementById('custom-ia-btn');
      if (!btn) return;

      function openChat() {
        if (window.voiceflow && window.voiceflow.chat) {
          try {
            // Método Primario
            window.voiceflow.chat.open();
            
            // Método Secundario (Si el widget-next tiene delay en el DOM)
            var vfHost = document.querySelector('#voiceflow-chat');
            if (vfHost && vfHost.shadowRoot) {
              var mainLauncher = vfHost.shadowRoot.querySelector('.vfrc-launcher');
              if (mainLauncher) mainLauncher.click();
              
              // Si el chat ya está en el DOM pero oculto por el host minimizado
              vfHost.style.width = '100vw';
              vfHost.style.height = '100dvh';
              vfHost.style.pointerEvents = 'auto';
              vfHost.style.zIndex = '99999999';
            }
          } catch(e) {
            console.warn("Falla en apertura de Voiceflow", e);
          }
        } else {
          // Reintento recursivo si click antes de carga
          setTimeout(openChat, 300);
        }
      }

      btn.addEventListener('click', function(e) {
        e.preventDefault();
        e.stopPropagation();
        openChat();
      });
    })();
  </script>
